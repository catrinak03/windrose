<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風玫瑰圖 Wind Rose Plot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
:root{
--surface-0:#f7f7f5;
--surface-1:#f1efe8;
--surface-2:#ffffff;
--border:rgba(11,11,11,0.10);
--text-primary:#0b0b0b;
--text-secondary:#52514e;
--text-muted:#898781;
--radius:8px;
}
*{box-sizing:border-box;}
body{
margin:0;
padding:2rem 1.5rem;
background:var(--surface-0);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:var(--text-primary);
}
.page{
max-width:820px;
margin:0 auto;
}
h1{
font-size:20px;
font-weight:500;
margin:0 0 1.25rem;
}
select,button{
height:36px;
padding:0 10px;
border-radius:var(--radius);
border:0.5px solid var(--border);
background:var(--surface-2);
color:var(--text-primary);
font-size:14px;
}
button{
cursor:pointer;
display:inline-flex;
align-items:center;
}
button:hover{background:var(--surface-1);}
button:active{transform:scale(0.98);}
select:focus,button:focus{outline:2px solid #185FA5; outline-offset:1px;}
</style>
</head>
<body>
<div class="page">
<h1>風玫瑰圖 Wind Rose Plot</h1>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">Wind rose chart showing wind speed and direction frequency distribution, with controls for direction sectors, speed bin width, and color scheme</h2>

<div class="wr-wrap" style="container-type:inline-size;width:100%;">

<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:end;background:var(--surface-1);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;">
<div>
<label for="wr-dirs" style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:4px;">風向分區 Direction sectors</label>
<select id="wr-dirs">
<option value="8">8</option>
<option value="16" selected>16</option>
<option value="32">32</option>
</select>
</div>
<div>
<label for="wr-binwidth" style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:4px;">風速分級寬度 Speed bin width (m/s)</label>
<select id="wr-binwidth">
<option value="1">1</option>
<option value="2" selected>2</option>
<option value="4">4</option>
</select>
</div>
<div>
<label for="wr-scheme" style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:4px;">配色方案 Color scheme</label>
<select id="wr-scheme">
<option value="vivid" selected>Vivid</option>
<option value="blue">Blue</option>
<option value="teal">Teal</option>
<option value="coral">Coral</option>
</select>
</div>
<button id="wr-regen" type="button"><i class="ti ti-refresh" aria-hidden="true" style="margin-right:6px;vertical-align:-2px;"></i>New sample</button>
</div>

<div style="display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;">
<div style="flex:1 1 320px;min-width:260px;">
<svg id="wr-svg" viewBox="0 0 320 320" width="100%" height="auto" style="display:block;" role="img" aria-label="Wind rose polar chart of speed and direction frequency, outer ring at 15 percent"></svg>
</div>
<div id="wr-legend" style="flex:0 0 150px;display:flex;flex-direction:column;gap:6px;padding-top:8px;"></div>
</div>

</div>
</div>

<script>
(function(){
var seed = 42;
var OUTER_RING = 15;
var STOPS = {
blue: ['#E6F1FB','#B5D4F4','#85B7EB','#378ADD','#185FA5','#0C447C','#042C53'],
teal: ['#E1F5EE','#9FE1CB','#5DCAA5','#1D9E75','#0F6E56','#085041','#04342C'],
coral: ['#FAECE7','#F5C4B3','#F0997B','#D85A30','#993C1D','#712B13','#4A1B0C']
};
var VIVID = ['#2a78d6','#1baf7a','#eda100','#008300','#9085e9','#e34948','#e87ba4','#eb6834'];
var NAMES = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];

function hexToRgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(function(x){return Math.round(x).toString(16).padStart(2,'0');}).join('');}
function colorAt(stops,i,n){
var t = n<=1?1:i/(n-1);
var pos = t*(stops.length-1);
var lo = Math.floor(pos), hi = Math.min(stops.length-1,lo+1);
var f = pos-lo;
var c1=hexToRgb(stops[lo]), c2=hexToRgb(stops[hi]);
return rgbToHex(c1[0]+(c2[0]-c1[0])*f, c1[1]+(c2[1]-c1[1])*f, c1[2]+(c2[2]-c1[2])*f);
}
function pickColor(scheme,i,n){
if(scheme==='vivid') return VIVID[i % VIVID.length];
return colorAt(STOPS[scheme], i, n);
}
function compassName(angleDeg){
var idx = Math.round(angleDeg/22.5)%16;
return NAMES[idx];
}
function annularPath(cx,cy,rIn,rOut,startA,endA){
function xy(r,a){var rad=(a-90)*Math.PI/180;return [cx+r*Math.cos(rad), cy+r*Math.sin(rad)];}
var p1=xy(rOut,startA), p2=xy(rOut,endA), p3=xy(rIn,endA), p4=xy(rIn,startA);
var large = (endA-startA)>180?1:0;
return 'M'+p1[0]+','+p1[1]+' A'+rOut+','+rOut+' 0 '+large+' 1 '+p2[0]+','+p2[1]+' L'+p3[0]+','+p3[1]+' A'+rIn+','+rIn+' 0 '+large+' 0 '+p4[0]+','+p4[1]+' Z';
}
function generateData(dirCount, binWidth, seedVal){
var maxSpeed = 20;
var numBins = Math.ceil(maxSpeed/binWidth);
var bins = [];
for(var i=0;i<numBins;i++) bins.push([i*binWidth,(i+1)*binWidth]);
var s = seedVal;
function rand(){ s = (s*1103515245+12345) & 0x7fffffff; return s/0x7fffffff; }
var prevailing = 210;
var freqs = [];
var total = 0;
for(var d=0; d<dirCount; d++){
var angle = d*360/dirCount;
var diff = Math.abs(angle-prevailing); if(diff>180) diff = 360-diff;
var base = Math.exp(-(diff*diff)/(2*55*55))*0.8 + 0.2*rand() + 0.05;
var row = [];
for(var b=0;b<numBins;b++){
var speedMid = bins[b][0]+binWidth/2;
var w = (speedMid/8)*Math.exp(-Math.pow(speedMid/8,2));
var v = Math.max(0, base*w*(0.7+0.6*rand()));
row.push(v);
total += v;
}
freqs.push(row);
}
for(var d2=0; d2<dirCount; d2++) for(var b2=0;b2<numBins;b2++) freqs[d2][b2] = freqs[d2][b2]/total*100;
return {freqs:freqs, bins:bins};
}
function renderLegend(bins, scheme){
var el = document.getElementById('wr-legend');
var html = '<div style="font-size:clamp(11px,2.2cqw,13px);font-weight:500;color:var(--text-primary);margin-bottom:4px;">Wind speed (m/s)</div>';
for(var i=0;i<bins.length;i++){
var c = pickColor(scheme, i, bins.length);
html += '<div style="display:flex;align-items:center;gap:8px;"><span style="width:14px;height:14px;border-radius:3px;background:'+c+';flex-shrink:0;"></span><span style="font-size:clamp(11px,2.2cqw,13px);color:var(--text-secondary);">'+bins[i][0]+'–'+bins[i][1]+'</span></div>';
}
el.innerHTML = html;
}
function draw(){
var dirCount = +document.getElementById('wr-dirs').value;
var binWidth = +document.getElementById('wr-binwidth').value;
var scheme = document.getElementById('wr-scheme').value;
var data = generateData(dirCount, binWidth, seed);
var freqs = data.freqs, bins = data.bins;
var cx=160, cy=160, maxR=118;
var ringVal = OUTER_RING;
var rings = [0.25,0.5,0.75,1].map(function(f){return f*ringVal;});
var parts = [];
rings.forEach(function(rv){
var r = rv/ringVal*maxR;
parts.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="1"/>');
parts.push('<text x="'+(cx+4)+'" y="'+(cy-r-2)+'" style="font-size:clamp(11px,2.4cqw,13px);" fill="var(--text-muted)">'+rv.toFixed(1)+'%</text>');
});
var sectorAngle = 360/dirCount;
var gap = Math.min(2, sectorAngle*0.15);
freqs.forEach(function(row,d){
var rIn = 0;
var startA = d*sectorAngle - sectorAngle/2 + gap/2;
var endA = d*sectorAngle + sectorAngle/2 - gap/2;
row.forEach(function(v,b){
var rOut = Math.min(maxR, rIn + (v/ringVal*maxR));
if(rOut>rIn){
var fill = pickColor(scheme, b, row.length);
var label = compassName(d*sectorAngle)+' '+bins[b][0]+'-'+bins[b][1]+' m/s: '+v.toFixed(2)+'%';
parts.push('<path d="'+annularPath(cx,cy,rIn,rOut,startA,endA)+'" fill="'+fill+'"><title>'+label+'</title></path>');
}
rIn = rOut;
});
});
var labelStep = dirCount/Math.min(dirCount,16);
for(var d=0; d<dirCount; d+=labelStep){
var angle = d*sectorAngle;
var rad = (angle-90)*Math.PI/180;
var lx = cx+(maxR+16)*Math.cos(rad);
var ly = cy+(maxR+16)*Math.sin(rad);
parts.push('<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" style="font-size:clamp(11px,2.6cqw,14px);" fill="var(--text-secondary)">'+compassName(angle)+'</text>');
}
document.getElementById('wr-svg').innerHTML = parts.join('');
renderLegend(bins, scheme);
}
document.getElementById('wr-dirs').addEventListener('change', draw);
document.getElementById('wr-binwidth').addEventListener('change', draw);
document.getElementById('wr-scheme').addEventListener('change', draw);
document.getElementById('wr-regen').addEventListener('click', function(){ seed = Math.floor(Math.random()*1e6); draw(); });
draw();
})();
</script>
</body>
</html>
